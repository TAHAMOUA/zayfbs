<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZayFBS - Nos Produits</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="product-page-bg">

    <div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <div class="cart-header-title">
                <span class="cart-header-icon"></span>
                <h3>Cart</h3>
            </div>
            <button class="cart-close" onclick="closeCart()">✕</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        
        <div class="cart-footer" id="cartFooter">
            <div class="cart-total">
                Total: <strong id="cartTotal">0 DH</strong>
            </div>
            <button class="btn-submit" style="width:100%">Commander</button>
        </div>
    </div>


    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="image/logo.png" alt="ZayFBS">
            </div>
            <ul class="nav-links">
                <li><a href="Accueil.html">Accueil</a></li>
                <li><a href="#" class="active">Produits</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="cart-icon" onclick="openCart()">
                <span class="cart-badge">0</span>
                <img src="image/cart.png" alt="Panier">
            </div>
        </nav>
    </header>

    <main class="container">
        <h2 class="section-title">Nos Huiles d’Olive</h2>
        
        <div class="admin-bar">
            <button  class="btn-primary">Ajouter au produit</button>
        </div>
        <div class="product-grid" id="product-card">
          
        </div>


    </main>


    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>

<div class="modal" id="productModal">
    <div class="modal-header">
        <h3>Ajouter un Nouveau Produit</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
        <div class="form-group">
            <label>Description / Nom du produit</label>
            <textarea id="newDesc" placeholder="Ex: Huile d'Olive Extra Vierge 1L"></textarea>
        </div>
        <div class="form-group">
            <label>Prix (DH)</label>
            <div class="input-icon">
                <input type="number" id="newPrice" placeholder="0.00">
                <span class="input-icon-symbol">DH</span>
            </div>
        </div>
        <div class="form-group">
            <label>Lien de l'image (URL)</label>
            <input type="file" id="newImage" placeholder="image/nom-image.png">
        </div>
    </div>
    <div class="modal-footer">
        <button class="btn-annuler" onclick="closeModal()">Annuler</button>
        <button class="btn-ajouter" onclick="submitNewProduct()">Ajouter</button>
    </div>
</div>



    <footer class="footer">
        <p>ZayFBS-region de Fquih ben saleh-Maroc | Contact:contact@zayfbs.ma | Copyright 2026</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
