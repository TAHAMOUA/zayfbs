<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZayFBS - Nos Produits</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="product-page-bg">

    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="zayfbs-logo.png" alt="ZayFBS">
            </div>
            <ul class="nav-links">
                <li><a href="Accueil.html">Accueil</a></li>
                <li><a href="#" class="active">Produits</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            <div class="cart-icon">
                <span class="cart-badge">0</span>

        </nav>
    </header>

    <main class="container">
        <h2 class="section-title">Nos Huiles d’Olive</h2>

        <div class="product-grid">

                    <img src="bottle.png" alt="Huile fine dait zay">

                <p class="price">70dh</p>

            </div>

            </div>

    <footer class="footer">
        <p>ZayFBS-region de Fquih ben saleh-Maroc | Contact:contact@zayfbs.ma | Copyright 2026</p>
    </footer>
